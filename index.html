<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#070812">
    <title>MB KK Kalender</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css?v=20260627-4">
    <style>
      .view-tabs {
        display: flex !important;
        flex-wrap: wrap !important;
        justify-content: center !important;
      }

      .topbar .view-tabs .tab-button {
        flex: 0 1 auto !important;
      }

      .week-grid {
        display: grid !important;
        grid-template-columns: repeat(7, minmax(150px, 1fr)) !important;
        grid-template-rows: auto !important;
        grid-auto-rows: auto !important;
        min-width: 980px !important;
      }

      .week-corner,
      .time-label,
      .slot-cell {
        display: none !important;
      }

      .week-grid > .week-day-head,
      .week-grid > .week-event {
        grid-column: auto !important;
        grid-row: auto !important;
      }

      .week-grid > .week-day-head {
        position: static !important;
        min-height: 78px !important;
        top: auto !important;
      }

      .week-grid > .week-event {
        min-height: 44px !important;
        margin: 8px !important;
      }

      .week-shell,
      .month-day {
        overflow: auto !important;
      }

      .month-events {
        align-content: start !important;
        overflow: visible !important;
      }

      .month-event strong,
      .month-event span {
        white-space: normal !important;
      }

      .more-events {
        display: none !important;
      }

      @media (max-width: 620px) {
        .week-grid {
          grid-template-columns: repeat(7, minmax(120px, 1fr)) !important;
          min-width: 840px !important;
        }
      }
    </style>
  </head>
  <body>
    <section class="auth-screen" id="auth-screen">
      <form class="auth-panel" id="login-form">
        <h1>Kalender Login</h1>
        <label class="field">
          <span>Benutzername</span>
          <input id="login-username" type="text" autocomplete="username" required>
        </label>
        <label class="field">
          <span>Passwort</span>
          <input id="login-password" type="password" autocomplete="current-password" required>
        </label>
        <p id="login-error" class="form-error" role="alert"></p>
        <button class="primary-button" type="submit">Einloggen</button>
      </form>
    </section>

    <div class="app-shell" id="app-shell" hidden>
      <header class="topbar">
        <div class="brand-block">
          <div>
            <h1>MB KK Kalender</h1>
            <p id="range-label" class="range-label"></p>
          </div>
        </div>

        <nav class="view-tabs" aria-label="Kalenderansicht">
          <button class="tab-button is-active" type="button" data-view="week">Woche</button>
          <button class="tab-button" type="button" data-view="month">Monat</button>
          <button class="tab-button" type="button" data-view="year">Jahr</button>
          <button class="tab-button tasks-axel-tab" id="tasks-axel-tab" type="button" data-view="tasks" hidden>Aufgaben Axel</button>
          <button class="tab-button orders-tab" id="orders-tab" type="button" data-view="orders">Aufträge erstellen</button>
          <button class="tab-button" id="maintenance-page-button" type="button">Wartungen</button>
        </nav>

        <div class="toolbar">
          <button class="icon-button" id="prev-button" type="button" aria-label="Zurück" title="Zurück">
            <span aria-hidden="true">‹</span>
          </button>
          <button class="text-button" id="today-button" type="button">Heute</button>
          <button class="icon-button" id="next-button" type="button" aria-label="Weiter" title="Weiter">
            <span aria-hidden="true">›</span>
          </button>
          <button class="primary-button" id="new-event-button" type="button">Termin</button>
          <button class="text-button" id="logout-button" type="button">Logout</button>
        </div>
      </header>

      <main class="calendar-stage">
        <section id="week-view" class="calendar-view week-view" aria-label="Wochenansicht"></section>
        <section id="month-view" class="calendar-view month-view" aria-label="Monatsansicht" hidden></section>
        <section id="year-view" class="calendar-view year-view" aria-label="Jahresansicht" hidden></section>
        <section id="tasks-view" class="calendar-view tasks-view" aria-label="Aufgaben Axel" hidden></section>
        <section id="orders-view" class="calendar-view orders-view" aria-label="Aufträge erstellen" hidden></section>
        <section id="maintenance-view" class="maintenance-view" aria-label="Wartungen" hidden>
          <div class="maintenance-shell">
            <form class="maintenance-form" id="maintenance-form">
              <div class="section-header">
                <h2>Wartungen</h2>
                <button class="primary-button" type="submit">Speichern</button>
              </div>

              <input id="maintenance-id" type="hidden">

              <div class="maintenance-fields">
                <label class="field">
                  <span>Kunde</span>
                  <input id="maintenance-customer" type="text" autocomplete="off" required>
                </label>
                <label class="field">
                  <span>Anschrift</span>
                  <input id="maintenance-address" type="text" autocomplete="street-address" required>
                </label>
                <label class="field">
                  <span>Anlage</span>
                  <input id="maintenance-system" type="text" autocomplete="off">
                </label>
                <fieldset class="field maintenance-type-field">
                  <span>Art</span>
                  <div class="maintenance-checks">
                    <label>
                      <input id="maintenance-private" type="checkbox" value="Privat">
                      <span>Privat</span>
                    </label>
                    <label>
                      <input id="maintenance-commercial" type="checkbox" value="Gewerblich">
                      <span>Gewerblich</span>
                    </label>
                  </div>
                </fieldset>
                <label class="field">
                  <span>Telefonnummer</span>
                  <input id="maintenance-phone" type="tel" autocomplete="tel">
                </label>
                <label class="field">
                  <span>Datum letzte Wartung</span>
                  <input id="maintenance-last-date" type="date" required>
                </label>
                <label class="field">
                  <span>Datum nächste Wartung</span>
                  <input id="maintenance-next-date" type="date" required>
                </label>
              </div>

              <p id="maintenance-error" class="form-error" role="alert"></p>
              <div class="maintenance-form-actions">
                <button class="text-button" id="maintenance-reset-button" type="button">Neu</button>
              </div>
            </form>

            <div class="maintenance-list" id="maintenance-list"></div>
          </div>
        </section>
      </main>

      <footer class="footer-actions">
        <span class="sync-status" id="sync-status">Lokal</span>
      </footer>
    </div>

    <dialog id="event-dialog" class="event-dialog">
      <form id="event-form" method="dialog">
        <div class="dialog-header">
          <h2 id="dialog-title">Termin</h2>
          <button class="icon-button" id="close-dialog-button" type="button" aria-label="Schließen" title="Schließen">
            <span aria-hidden="true">×</span>
          </button>
        </div>

        <input id="event-id" type="hidden">

        <label class="field">
          <span>Titel</span>
          <input id="event-title" type="text" autocomplete="off" required>
        </label>

        <div class="field-grid">
          <label class="field">
            <span>Von</span>
            <input id="event-date" type="date" required>
          </label>
          <label class="field">
            <span>Bis</span>
            <input id="event-end-date" type="date" required>
          </label>
          <label class="field">
            <span>Beginn</span>
            <input id="event-start" type="time" min="07:00" max="16:45" step="900" required>
          </label>
          <label class="field">
            <span>Ende</span>
            <input id="event-end" type="time" min="07:15" max="17:00" step="900" required>
          </label>
        </div>

        <label class="field">
          <span>Notiz</span>
          <textarea id="event-note" rows="3"></textarea>
        </label>

        <p id="form-error" class="form-error" role="alert"></p>

        <div class="dialog-actions">
            <button class="danger-button" id="delete-event-button" type="button">Löschen</button>
          <div class="dialog-action-group">
            <button class="text-button" id="cancel-event-button" type="button">Abbrechen</button>
            <button class="primary-button" type="submit">Speichern</button>
          </div>
        </div>
      </form>
    </dialog>

    <script src="supabase-config.js?v=20260625-7"></script>
    <script src="app.js?v=20260627-4"></script>
    <script src="calendar-layout-overrides.js?v=20260625-7"></script>
    <script src="tasks-axel.js?v=20260627-4"></script>
    <script src="orders.js?v=20260627-4"></script>
  </body>
</html>

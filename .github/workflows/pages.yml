name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare static files
        run: |
          mkdir -p _site
          cp index.html styles.css *.js *.png manifest.webmanifest supabase-config.js .nojekyll _site/
          mkdir -p _site/supabase
          cp supabase/*.sql _site/supabase/
          mkdir -p _site/duft-tresor
          cp duft-tresor/* _site/duft-tresor/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

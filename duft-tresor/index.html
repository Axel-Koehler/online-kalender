<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#070812">
    <title>Duft Tresor - Mischungsrechner</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070812;
        --panel: rgba(8, 7, 27, 0.94);
        --line-strong: rgba(0, 217, 255, 0.72);
        --text: #f7fbff;
        --muted: #9da7d7;
        --cyan: #00d9ff;
        --magenta: #ff2dfd;
        --yellow: #f8ff13;
        --orange: #ff9f1c;
        --rose: #ff3d6e;
        --shadow: 0 0 24px rgba(103, 54, 255, 0.45), 0 0 48px rgba(255, 45, 253, 0.24);
        --field-height: 44px;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
        font-weight: 400 !important;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        background:
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0.025) 1px, transparent 1px, transparent 5px),
          linear-gradient(180deg, rgba(5, 7, 20, 0.62), rgba(5, 7, 20, 0.92)),
          linear-gradient(90deg, rgba(0, 217, 255, 0.08), rgba(255, 45, 253, 0.12), rgba(248, 255, 19, 0.05)),
          var(--bg);
        letter-spacing: 0;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        background:
          linear-gradient(90deg, rgba(0, 217, 255, 0.08) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 45, 253, 0.06) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.72), transparent 82%);
        pointer-events: none;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(135deg, transparent 0 17%, rgba(0, 217, 255, 0.08) 17% 18%, transparent 18% 55%, rgba(248, 255, 19, 0.06) 55% 56%, transparent 56%),
          linear-gradient(225deg, transparent 0 24%, rgba(255, 45, 253, 0.1) 24% 25%, transparent 25%);
        pointer-events: none;
      }

      button,
      input {
        font: inherit;
        letter-spacing: 0;
      }

      button {
        cursor: pointer;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      .app-shell {
        min-height: 100vh;
        padding: clamp(10px, 2vw, 24px);
      }

      .topbar {
        position: sticky;
        top: 10px;
        z-index: 10;
        display: grid;
        grid-template-columns: minmax(260px, 1fr) auto minmax(160px, 0.5fr);
        gap: 18px;
        align-items: center;
        width: min(1220px, 100%);
        margin: 0 auto 16px;
        padding: 16px clamp(14px, 2.5vw, 28px);
        background:
          linear-gradient(90deg, rgba(248, 255, 19, 0.1), transparent 12%, rgba(103, 54, 255, 0.18) 50%, transparent 88%, rgba(0, 217, 255, 0.1)),
          var(--panel);
        border: 1px solid var(--line-strong);
        box-shadow: var(--shadow), inset 0 0 18px rgba(0, 217, 255, 0.12);
        backdrop-filter: blur(18px);
      }

      .topbar::before,
      .calculator-shell::before {
        content: "";
        position: absolute;
        inset: 5px 12px;
        border-top: 1px solid rgba(198, 31, 255, 0.72);
        border-bottom: 1px solid rgba(198, 31, 255, 0.72);
        pointer-events: none;
      }

      .brand-block {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 13px;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        flex: 0 0 auto;
        clip-path: polygon(50% 0, 100% 27%, 100% 73%, 50% 100%, 0 73%, 0 27%);
        background: linear-gradient(135deg, var(--yellow), var(--orange) 24%, var(--magenta) 58%, var(--cyan));
        box-shadow: 0 0 20px rgba(0, 217, 255, 0.46), 0 0 26px rgba(255, 45, 253, 0.28);
      }

      h1 {
        color: rgba(247, 251, 255, 0.98);
        font-size: clamp(1.05rem, 1.45vw, 1.45rem);
        line-height: 1.1;
        text-transform: uppercase;
        text-shadow: 0 0 12px rgba(0, 217, 255, 0.72);
      }

      .range-label {
        margin-top: 7px;
        color: var(--muted);
        font-size: 0.92rem;
        overflow-wrap: anywhere;
      }

      .view-tabs {
        display: inline-grid;
        grid-auto-flow: column;
        gap: 6px;
        align-items: center;
      }

      .toolbar {
        justify-self: end;
      }

      .tab-button,
      .nav-link,
      .primary-button,
      .danger-button,
      .text-button {
        position: relative;
        min-height: 34px;
        border: 1px solid rgba(0, 217, 255, 0.46);
        border-radius: 4px;
        color: rgba(247, 251, 255, 0.94);
        background: linear-gradient(180deg, rgba(25, 29, 68, 0.92), rgba(8, 12, 36, 0.94));
        box-shadow: 0 0 10px rgba(0, 217, 255, 0.18), inset 0 0 8px rgba(0, 217, 255, 0.1);
        font-size: 0.82rem;
        text-transform: uppercase;
      }

      .tab-button {
        min-width: 62px;
        padding: 0 12px;
      }

      .nav-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 11px;
        text-decoration: none;
        white-space: nowrap;
      }

      .text-button,
      .primary-button,
      .danger-button {
        padding: 0 11px;
        white-space: nowrap;
      }

      .tab-button:hover,
      .tab-button:focus-visible,
      .nav-link:hover,
      .nav-link:focus-visible,
      .primary-button:hover,
      .primary-button:focus-visible,
      .danger-button:hover,
      .danger-button:focus-visible,
      .text-button:hover,
      .text-button:focus-visible {
        color: #fff;
        border-color: rgba(248, 255, 19, 0.92);
        outline: none;
        box-shadow: 0 0 12px rgba(248, 255, 19, 0.18), inset 0 -2px 0 rgba(248, 255, 19, 0.48);
      }

      .tab-button.is-active {
        color: var(--yellow);
        border-color: rgba(248, 255, 19, 0.72);
        background: linear-gradient(180deg, rgba(45, 37, 92, 0.94), rgba(12, 16, 42, 0.96));
        box-shadow: 0 0 12px rgba(248, 255, 19, 0.18), inset 0 -2px 0 rgba(248, 255, 19, 0.72);
      }

      .nav-link.is-active {
        color: var(--yellow);
        border-color: rgba(248, 255, 19, 0.72);
      }

      .primary-button {
        color: var(--yellow);
      }

      .danger-button {
        border-color: rgba(255, 61, 110, 0.74);
        background: linear-gradient(180deg, rgba(74, 20, 45, 0.94), rgba(32, 9, 28, 0.96));
      }

      .calculator-stage {
        width: min(1220px, 100%);
        margin: 0 auto;
        padding: clamp(8px, 2vw, 18px) 0;
      }

      .calculator-shell {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
        gap: clamp(14px, 2vw, 20px);
        padding: clamp(14px, 2vw, 22px);
        background:
          linear-gradient(135deg, rgba(248, 255, 19, 0.08), transparent 18%),
          linear-gradient(225deg, rgba(255, 45, 253, 0.12), transparent 24%),
          var(--panel);
        border: 1px solid var(--line-strong);
        box-shadow: var(--shadow), inset 0 0 24px rgba(0, 217, 255, 0.08);
      }

      .input-panel,
      .result-panel {
        min-width: 0;
      }

      .input-panel {
        display: grid;
        gap: 16px;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .section-header h2 {
        color: var(--yellow);
        font-size: 1.2rem;
        text-transform: uppercase;
        text-shadow: 0 0 12px rgba(248, 255, 19, 0.48);
      }

      .status-chip {
        min-height: 28px;
        display: inline-flex;
        align-items: center;
        padding: 0 10px;
        color: #10120d;
        background: var(--yellow);
        border: 1px solid rgba(248, 255, 19, 0.9);
        clip-path: polygon(12% 0, 100% 0, 100% 76%, 88% 100%, 0 100%, 0 24%);
        font-size: 0.74rem;
        text-transform: uppercase;
        box-shadow: 0 0 16px rgba(248, 255, 19, 0.36);
      }

      .field-grid,
      .oil-row,
      .oil-head {
        display: grid;
        grid-template-columns: 1.4fr 0.75fr 0.7fr;
        gap: 10px;
        align-items: end;
      }

      .field-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .mix-name-grid {
        grid-template-columns: minmax(0, 1fr) auto auto;
      }

      .field {
        display: grid;
        gap: 6px;
        color: var(--cyan);
        font-size: 0.82rem;
        text-transform: uppercase;
        text-shadow: 0 0 9px rgba(0, 217, 255, 0.45);
      }

      .field input {
        width: 100%;
        height: var(--field-height);
        min-height: var(--field-height);
        border: 1px solid rgba(0, 217, 255, 0.48);
        border-radius: 0;
        padding: 10px 11px;
        color: var(--text);
        background: rgba(3, 6, 22, 0.82);
        box-shadow: inset 0 0 14px rgba(0, 217, 255, 0.08);
        text-transform: none;
      }

      .field input:focus {
        border-color: var(--yellow);
        outline: none;
        box-shadow: 0 0 16px rgba(248, 255, 19, 0.18), inset 0 0 14px rgba(0, 217, 255, 0.12);
      }

      .oil-table {
        display: grid;
        gap: 8px;
      }

      .oil-head {
        min-height: 36px;
        padding: 0 9px;
        color: var(--cyan);
        background: rgba(7, 11, 31, 0.96);
        border: 1px solid rgba(0, 217, 255, 0.24);
        font-size: 0.74rem;
        text-transform: uppercase;
        text-shadow: 0 0 10px rgba(0, 217, 255, 0.58);
      }

      .oil-row {
        padding: 9px;
        border: 1px solid rgba(0, 217, 255, 0.24);
        background: rgba(9, 12, 34, 0.58);
      }

      .gram-output {
        min-height: var(--field-height);
        display: grid;
        place-items: center end;
        padding: 0 11px;
        color: var(--yellow);
        background: rgba(3, 6, 22, 0.82);
        border: 1px solid rgba(248, 255, 19, 0.44);
        text-shadow: 0 0 10px rgba(248, 255, 19, 0.4);
        white-space: nowrap;
      }

      .result-panel {
        display: grid;
        gap: 10px;
        align-content: start;
      }

      .result-card,
      .balance-note {
        display: grid;
        gap: 8px;
        padding: 16px;
        border: 1px solid rgba(0, 217, 255, 0.36);
        background: linear-gradient(90deg, rgba(0, 217, 255, 0.06), rgba(255, 45, 253, 0.05)), rgba(4, 7, 25, 0.72);
        box-shadow: inset 0 0 18px rgba(0, 217, 255, 0.08);
      }

      .result-card span,
      .balance-note span {
        color: var(--cyan);
        font-size: 0.76rem;
        text-transform: uppercase;
        text-shadow: 0 0 10px rgba(0, 217, 255, 0.58);
      }

      .result-card strong,
      .balance-note strong {
        color: var(--text);
        font-size: clamp(1.65rem, 4vw, 2.35rem);
        line-height: 1;
        text-shadow: 0 0 12px rgba(0, 217, 255, 0.48);
      }

      .primary-result strong {
        color: var(--yellow);
        text-shadow: 0 0 16px rgba(248, 255, 19, 0.44);
      }

      .balance-note p {
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.4;
      }

      .balance-note.is-warning {
        border-color: rgba(255, 61, 110, 0.72);
        box-shadow: inset 0 0 18px rgba(255, 61, 110, 0.1);
      }

      .balance-note.is-warning strong {
        color: var(--rose);
      }

      .saved-panel {
        grid-column: 1 / -1;
        display: grid;
        gap: 12px;
        padding: 16px;
        border: 1px solid rgba(0, 217, 255, 0.36);
        background: linear-gradient(90deg, rgba(0, 217, 255, 0.06), rgba(255, 45, 253, 0.05)), rgba(4, 7, 25, 0.72);
        box-shadow: inset 0 0 18px rgba(0, 217, 255, 0.08);
      }

      .saved-panel h2 {
        color: var(--yellow);
        font-size: 1rem;
        text-transform: uppercase;
        text-shadow: 0 0 12px rgba(248, 255, 19, 0.48);
      }

      .saved-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 8px;
      }

      .saved-empty {
        min-height: 54px;
        display: grid;
        place-items: center start;
        color: var(--muted);
        font-size: 0.86rem;
        text-transform: uppercase;
      }

      .saved-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        padding: 10px;
        border: 1px solid rgba(0, 217, 255, 0.24);
        background: rgba(9, 12, 34, 0.58);
      }

      .saved-item.is-active {
        border-color: rgba(248, 255, 19, 0.72);
        box-shadow: inset 0 -2px 0 rgba(248, 255, 19, 0.42);
      }

      .saved-info {
        min-width: 0;
      }

      .saved-info strong {
        display: block;
        overflow: hidden;
        color: var(--text);
        text-overflow: ellipsis;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .saved-info span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .saved-actions {
        display: flex;
        gap: 6px;
      }

      .saved-actions .text-button,
      .saved-actions .danger-button {
        min-height: 30px;
        padding-inline: 8px;
        font-size: 0.72rem;
      }

      .save-status {
        min-height: 20px;
        color: var(--muted);
        font-size: 0.84rem;
      }

      @media (max-width: 900px) {
        .app-shell {
          padding: 8px;
        }

        .topbar {
          top: 8px;
          grid-template-columns: 1fr;
          gap: 12px;
          align-items: stretch;
        }

        .view-tabs {
          justify-self: stretch;
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .toolbar {
          justify-self: stretch;
        }

        .text-button,
        .nav-link,
        .primary-button,
        .danger-button {
          width: 100%;
        }

        .calculator-shell {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 620px) {
        .brand-mark {
          width: 36px;
          height: 36px;
        }

        .range-label {
          font-size: 0.84rem;
        }

        .tab-button {
          min-width: 0;
          padding-inline: 8px;
          font-size: 0.76rem;
        }

        .section-header,
        .field-grid,
        .mix-name-grid,
        .oil-row,
        .oil-head {
          grid-template-columns: 1fr;
        }

        .saved-item,
        .saved-actions {
          grid-template-columns: 1fr;
        }

        .saved-actions {
          display: grid;
        }

        .section-header {
          align-items: stretch;
        }

        .oil-head {
          display: none;
        }

        .gram-output {
          place-items: center start;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <h1>Duft Tresor - Mischungsrechner</h1>
            <p class="range-label">Wachs und bis zu 5 Duftoele in Gramm berechnen</p>
          </div>
        </div>

        <div class="view-tabs" aria-label="Duftanteil">
          <button class="tab-button" data-percent="15" type="button">15%</button>
          <button class="tab-button is-active" data-percent="16" type="button">16%</button>
          <button class="tab-button" data-percent="17" type="button">17%</button>
          <button class="tab-button" data-percent="18" type="button">18%</button>
        </div>

        <div class="toolbar">
          <a class="nav-link is-active" id="percent-page-link" href="./">Prozent</a>
          <a class="nav-link" id="weight-page-link" href="gewicht.html">Gramm</a>
        </div>
      </header>

      <section class="calculator-stage">
        <div class="calculator-shell">
          <section class="input-panel" aria-label="Mischung">
            <div class="section-header">
              <h2>Mischung</h2>
              <span class="status-chip">15-18% Duftoel</span>
            </div>

            <div class="field-grid mix-name-grid">
              <label class="field">
                <span>Name der Mischung</span>
                <input id="mixture-name" maxlength="46" placeholder="z. B. Amber Vanille 16%" type="text">
              </label>
              <button class="primary-button" id="save-mixture" type="button">Speichern</button>
              <button class="text-button" id="new-mixture" type="button">Neu</button>
            </div>
            <p class="save-status" id="save-status" role="status"></p>

            <div class="field-grid">
              <label class="field">
                <span>Fertige Mischung in g</span>
                <input id="total-weight" min="0" step="1" type="number" value="100">
              </label>

              <label class="field">
                <span id="fragrance-main-label">Duftoel gesamt in %</span>
                <input id="fragrance-percent" max="18" min="15" step="0.1" type="number" value="16">
              </label>
            </div>

            <div class="oil-table" aria-label="Duftoele">
              <div class="oil-head">
                <span>Oel</span>
                <span>Anteil</span>
                <span>Gramm</span>
              </div>

              <div id="oil-rows"></div>
            </div>
          </section>

          <aside class="result-panel" aria-label="Ergebnis">
            <div class="result-card primary-result">
                <span>Wachs</span>
                <strong id="wax-result">0,0 g</strong>
              </div>
              <div class="result-card">
              <span id="fragrance-result-label">Duftoel gesamt</span>
              <strong id="fragrance-result">0,0 g</strong>
            </div>
            <div class="result-card">
              <span>Fertige Mischung</span>
              <strong id="finished-result">0,0 g</strong>
            </div>

            <div class="balance-note" id="balance-note">
              <span>Oelanteile</span>
              <strong id="share-result">0,0%</strong>
              <p id="balance-text">Die Duftoele sollten zusammen 100% ergeben.</p>
            </div>
          </aside>

          <section class="saved-panel" aria-label="Gespeicherte Mischungen">
            <h2>Gespeichert</h2>
            <div class="saved-list" id="saved-list"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="../supabase-config.js"></script>
    <script>
      const SUPABASE_CDN = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
      const SUPABASE_CONFIG = window.KALENDER_SUPABASE_CONFIG || {};
      const TABLE = "duft_tresor_mixtures";
      const storageKey = "duft-tresor-mixtures-v1";
      const pageMode = window.location.hash === "#gewicht" ? "weight" : "percent";
      let selectedFragrancePercent = 16;
      const defaultOils = [
        { id: 1, name: "Duftoel 1", share: 0, weight: 0 },
        { id: 2, name: "Duftoel 2", share: 0, weight: 0 },
        { id: 3, name: "", share: 0, weight: 0 },
        { id: 4, name: "", share: 0, weight: 0 },
        { id: 5, name: "", share: 0, weight: 0 },
      ];
      const oils = defaultOils.map((oil) => ({ ...oil }));
      let savedMixtures = loadSavedMixtures();
      let activeMixtureId = null;
      let supabaseClient = null;

      const formatter = new Intl.NumberFormat("de-DE", {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1,
      });

      const mixtureNameInput = document.querySelector("#mixture-name");
      const totalWeightInput = document.querySelector("#total-weight");
      const fragrancePercentInput = document.querySelector("#fragrance-percent");
      const fragranceMainLabel = document.querySelector("#fragrance-main-label");
      const fragranceResultLabel = document.querySelector("#fragrance-result-label");
      const oilRows = document.querySelector("#oil-rows");
      const savedList = document.querySelector("#saved-list");
      const saveStatus = document.querySelector("#save-status");
      const waxResult = document.querySelector("#wax-result");
      const fragranceResult = document.querySelector("#fragrance-result");
      const finishedResult = document.querySelector("#finished-result");
      const shareResult = document.querySelector("#share-result");
      const balanceNote = document.querySelector("#balance-note");
      const balanceText = document.querySelector("#balance-text");

      function formatGram(value) {
        return `${formatter.format(Number.isFinite(value) ? value : 0)} g`;
      }

      function formatPercent(value) {
        return `${formatter.format(Number.isFinite(value) ? value : 0)}%`;
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (character) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#039;",
        })[character]);
      }

      function loadSavedMixtures() {
        try {
          const parsed = JSON.parse(localStorage.getItem(storageKey) || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function isSupabaseConfigured() {
        return Boolean(SUPABASE_CONFIG.url && SUPABASE_CONFIG.anonKey);
      }

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const existing = document.querySelector(`script[src="${src}"]`);
          if (existing) {
            resolve();
            return;
          }
          const script = document.createElement("script");
          script.src = src;
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }

      async function getSupabaseClient() {
        if (!isSupabaseConfigured()) return null;
        if (supabaseClient) return supabaseClient;
        if (!window.supabase) {
          await loadScript(SUPABASE_CDN);
        }
        supabaseClient = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
        return supabaseClient;
      }

      function persistSavedMixtures() {
        sortSavedMixtures();
        localStorage.setItem(storageKey, JSON.stringify(savedMixtures));
      }

      function fromRemoteRow(row) {
        return {
          id: row.id,
          name: row.name || "",
          mode: row.mode || "percent",
          totalWeight: Number(row.total_weight) || 0,
          fragrancePercent: Number(row.fragrance_percent) || 0,
          fragranceWeight: Number(row.fragrance_weight) || 0,
          waxWeight: Number(row.wax_weight) || 0,
          oils: Array.isArray(row.oils) ? row.oils : [],
          updatedAt: row.updated_at || row.created_at || new Date().toISOString(),
        };
      }

      function toRemoteRow(mixture) {
        const totals = getTotals();
        return {
          id: mixture.id && mixture.id.startsWith("mix-") ? undefined : mixture.id,
          name: mixture.name,
          mode: mixture.mode || pageMode,
          total_weight: mixture.totalWeight,
          fragrance_percent: totals.fragrancePercent,
          fragrance_weight: totals.fragranceWeight,
          wax_weight: totals.waxWeight,
          oils: mixture.oils,
        };
      }

      async function loadRemoteMixtures() {
        const client = await getSupabaseClient();
        if (!client) {
          setStatus("Supabase ist nicht konfiguriert. Es wird lokal gespeichert.");
          renderSavedList();
          return;
        }

        const localMixtures = loadSavedMixtures();
        const { data, error } = await client
          .from(TABLE)
          .select("id,name,mode,total_weight,fragrance_percent,fragrance_weight,wax_weight,oils,created_at,updated_at")
          .order("name", { ascending: true });

        if (error) {
          console.error(error);
          setStatus("Oeffentliche Datensaetze konnten nicht geladen werden.");
          renderSavedList();
          return;
        }

        const remoteNames = new Set(data.map((row) => (row.name || "").trim().toLocaleLowerCase("de")));
        const localOnly = localMixtures.filter((mixture) =>
          mixture.id?.startsWith("mix-") &&
          mixture.name &&
          !remoteNames.has(mixture.name.trim().toLocaleLowerCase("de"))
        );

        if (localOnly.length) {
          const payload = localOnly.map((mixture) => {
            const fragrancePercent = Number(mixture.fragrancePercent) || 0;
            const totalWeight = Number(mixture.totalWeight) || 0;
            const fragranceWeight = Number(mixture.fragranceWeight) || totalWeight * (fragrancePercent / 100);
            return {
              name: mixture.name,
              mode: mixture.mode || "percent",
              total_weight: totalWeight,
              fragrance_percent: fragrancePercent,
              fragrance_weight: fragranceWeight,
              wax_weight: Number(mixture.waxWeight) || totalWeight - fragranceWeight,
              oils: mixture.oils || [],
            };
          });
          const { data: migrated, error: migrationError } = await client
            .from(TABLE)
            .insert(payload)
            .select("id,name,mode,total_weight,fragrance_percent,fragrance_weight,wax_weight,oils,created_at,updated_at");
          if (!migrationError && migrated) {
            data.push(...migrated);
          }
        }

        savedMixtures = data.map(fromRemoteRow);
        persistSavedMixtures();
        renderSavedList();
      }

      function sortSavedMixtures() {
        savedMixtures.sort((first, second) =>
          first.name.localeCompare(second.name, "de", { sensitivity: "base" })
        );
      }

      function setStatus(message) {
        saveStatus.textContent = message;
        window.clearTimeout(setStatus.timeout);
        setStatus.timeout = window.setTimeout(() => {
          saveStatus.textContent = "";
        }, 3200);
      }

      function renderRows() {
        oilRows.innerHTML = oils
          .map((oil) => `
            <div class="oil-row">
              <label class="field oil-name">
                <span>Duftoel ${oil.id}</span>
                <input data-field="name" data-id="${oil.id}" maxlength="34" placeholder="Duftoel ${oil.id}" type="text" value="${escapeHtml(oil.name)}">
              </label>
              <label class="field">
                <span>${pageMode === "weight" ? "Gramm Duftoel" : "% vom Duftoel"}</span>
                <input data-field="${pageMode === "weight" ? "weight" : "share"}" data-id="${oil.id}" min="0" step="0.1" type="number" value="${pageMode === "weight" ? oil.weight : oil.share}">
              </label>
              <output class="gram-output" id="oil-output-${oil.id}">${pageMode === "weight" ? "0,0%" : "0,0 g"}</output>
            </div>
          `)
          .join("");
      }

      function renderSavedList() {
        sortSavedMixtures();

        if (!savedMixtures.length) {
          savedList.innerHTML = '<div class="saved-empty">Noch keine Mischungen gespeichert.</div>';
          return;
        }

        savedList.innerHTML = savedMixtures
          .map((mixture) => `
            <article class="saved-item ${mixture.id === activeMixtureId ? "is-active" : ""}">
              <div class="saved-info">
                <strong>${escapeHtml(mixture.name)}</strong>
                <span>${mixture.mode === "weight" ? "Gramm-Rechner" : "Prozent-Rechner"} - ${formatGram(mixture.totalWeight)} - ${formatter.format(mixture.fragrancePercent)}% Duftoel</span>
              </div>
              <div class="saved-actions">
                <button class="text-button" data-action="load" data-id="${mixture.id}" type="button">Bearbeiten</button>
                <button class="danger-button" data-action="delete" data-id="${mixture.id}" type="button">Loeschen</button>
              </div>
            </article>
          `)
          .join("");
      }

      function getTotals() {
        const totalWeight = Math.max(Number(totalWeightInput.value) || 0, 0);
        const fragranceWeightByOil = oils.reduce((sum, oil) => sum + (Number(oil.weight) || 0), 0);
        const fragrancePercent = pageMode === "weight"
          ? selectedFragrancePercent
          : Math.min(Math.max(Number(fragrancePercentInput.value) || 15, 15), 18);
        const fragranceWeight = totalWeight * (fragrancePercent / 100);
        const waxWeight = totalWeight - fragranceWeight;
        return { totalWeight, fragranceWeight, fragrancePercent, waxWeight, fragranceWeightByOil };
      }

      function calculate() {
        const { totalWeight, fragranceWeight, fragrancePercent, waxWeight, fragranceWeightByOil } = getTotals();
        const activeOils = oils.filter((oil) =>
          oil.name.trim() || (pageMode === "weight" ? oil.weight > 0 : oil.share > 0)
        );
        const shareTotal = pageMode === "weight"
          ? oils.reduce((sum, oil) => sum + Number(oil.weight || 0), 0)
          : activeOils.reduce((sum, oil) => sum + Number(oil.share || 0), 0);
        const balanced = pageMode === "weight" ? fragranceWeightByOil > 0 : Math.abs(shareTotal - 100) < 0.05;

        if (pageMode === "weight") {
          fragrancePercentInput.value = fragranceWeight.toFixed(1);
        }

        waxResult.textContent = formatGram(waxWeight);
        fragranceResult.textContent = pageMode === "weight" ? formatPercent(fragrancePercent) : formatGram(fragranceWeight);
        finishedResult.textContent = formatGram(totalWeight);
        shareResult.textContent = pageMode === "weight" ? formatGram(shareTotal) : formatPercent(shareTotal);
        balanceNote.classList.toggle("is-warning", !balanced);
        balanceText.textContent = pageMode === "weight"
          ? balanced
            ? `Die Oelgewichte werden auf ${formatter.format(fragrancePercent)}% Duftoel bei 100 g fertiger Mischung umgerechnet.`
            : "Bitte mindestens ein Oelgewicht eingeben."
          : balanced
            ? "Die Duftoele ergeben zusammen 100%."
            : "Die Duftoele sollten zusammen 100% ergeben.";

        oils.forEach((oil) => {
          const output = document.querySelector(`#oil-output-${oil.id}`);
          if (output) {
            output.textContent = pageMode === "weight"
              ? formatPercent(fragranceWeightByOil > 0 ? ((Number(oil.weight) || 0) / fragranceWeightByOil) * 100 : 0)
              : formatGram(fragranceWeight * ((Number(oil.share) || 0) / 100));
          }
        });

        document.querySelectorAll(".tab-button").forEach((button) => {
          button.classList.toggle("is-active", Number(button.dataset.percent) === Math.round(fragrancePercent));
        });
      }

      function currentSnapshot(id) {
        const totals = getTotals();
        return {
          id: id || `mix-${Date.now()}-${Math.round(Math.random() * 100000)}`,
          name: mixtureNameInput.value.trim(),
          mode: pageMode,
          totalWeight: totals.totalWeight,
          fragrancePercent: totals.fragrancePercent,
          fragranceWeight: totals.fragranceWeight,
          waxWeight: totals.waxWeight,
          oils: oils.map((oil) => ({
            id: oil.id,
            name: oil.name,
            share: Number(oil.share) || 0,
            weight: Number(oil.weight) || 0,
          })),
          updatedAt: new Date().toISOString(),
        };
      }

      async function saveMixture() {
        const name = mixtureNameInput.value.trim();
        if (!name) {
          setStatus("Bitte zuerst einen Namen fuer die Mischung vergeben.");
          mixtureNameInput.focus();
          return;
        }

        const snapshot = currentSnapshot(activeMixtureId);
        const client = await getSupabaseClient();

        if (client) {
          setStatus("Speichere oeffentlich...");
          const payload = toRemoteRow(snapshot);
          const request = activeMixtureId && !activeMixtureId.startsWith("mix-")
            ? client.from(TABLE).update(payload).eq("id", activeMixtureId)
            : client.from(TABLE).insert(payload);
          const { data, error } = await request
            .select("id,name,mode,total_weight,fragrance_percent,fragrance_weight,wax_weight,oils,created_at,updated_at")
            .single();
          if (error) {
            console.error(error);
            setStatus("Oeffentliches Speichern fehlgeschlagen.");
            return;
          }
          activeMixtureId = data.id;
          await loadRemoteMixtures();
          setStatus(`Mischung "${name}" oeffentlich gespeichert.`);
          return;
        }

        const existingIndex = savedMixtures.findIndex((mixture) => mixture.id === snapshot.id);
        if (existingIndex >= 0) savedMixtures[existingIndex] = snapshot;
        else savedMixtures.unshift(snapshot);
        activeMixtureId = snapshot.id;
        persistSavedMixtures();
        renderSavedList();
        setStatus(`Mischung "${name}" gespeichert.`);
      }

      function loadMixture(id) {
        const mixture = savedMixtures.find((item) => item.id === id);
        if (!mixture) return;

        activeMixtureId = mixture.id;
        mixtureNameInput.value = mixture.name;
        totalWeightInput.value = pageMode === "weight" ? 100 : mixture.totalWeight;
        selectedFragrancePercent = Math.min(Math.max(Number(mixture.fragrancePercent) || 16, 15), 18);
        fragrancePercentInput.value = pageMode === "weight" ? (100 * (selectedFragrancePercent / 100)).toFixed(1) : mixture.fragrancePercent;
        defaultOils.forEach((defaultOil, index) => {
          const savedOil = mixture.oils.find((oil) => oil.id === defaultOil.id) || defaultOil;
          oils[index] = {
            id: defaultOil.id,
            name: savedOil.name || "",
            share: Number(savedOil.share) || 0,
            weight: Number(savedOil.weight) || 0,
          };
        });

        renderRows();
        renderSavedList();
        calculate();
        setStatus(`Mischung "${mixture.name}" geladen und bereit zum Bearbeiten.`);
      }

      async function deleteMixture(id) {
        const mixture = savedMixtures.find((item) => item.id === id);
        if (!mixture) return;
        if (!window.confirm(`Mischung "${mixture.name}" wirklich loeschen?`)) return;

        const client = await getSupabaseClient();
        if (client && !id.startsWith("mix-")) {
          setStatus("Loesche oeffentlich...");
          const { error } = await client.from(TABLE).delete().eq("id", id);
          if (error) {
            console.error(error);
            setStatus("Oeffentliches Loeschen fehlgeschlagen.");
            return;
          }
        }

        savedMixtures = savedMixtures.filter((item) => item.id !== id);
        if (activeMixtureId === id) {
          activeMixtureId = null;
        }
        persistSavedMixtures();
        renderSavedList();
        setStatus(`Mischung "${mixture.name}" geloescht.`);
      }

      function newMixture() {
        activeMixtureId = null;
        mixtureNameInput.value = "";
        totalWeightInput.value = 100;
        selectedFragrancePercent = 16;
        fragrancePercentInput.value = pageMode === "weight" ? "16.0" : "16";
        defaultOils.forEach((defaultOil, index) => {
          oils[index] = { ...defaultOil };
        });
        renderRows();
        renderSavedList();
        calculate();
        setStatus("Neue Mischung angelegt.");
      }

      renderRows();
      renderSavedList();
      configureMode();
      calculate();
      loadRemoteMixtures();

      mixtureNameInput.addEventListener("input", () => {
        if (activeMixtureId) {
          renderSavedList();
        }
      });
      totalWeightInput.addEventListener("input", calculate);
      fragrancePercentInput.addEventListener("input", calculate);

      document.querySelector(".view-tabs").addEventListener("click", (event) => {
        const button = event.target.closest(".tab-button");
        if (!button) return;
        selectedFragrancePercent = Number(button.dataset.percent);
        fragrancePercentInput.value = button.dataset.percent;
        calculate();
      });

      document.querySelector("#save-mixture").addEventListener("click", saveMixture);
      document.querySelector("#new-mixture").addEventListener("click", newMixture);

      savedList.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        if (button.dataset.action === "load") {
          loadMixture(button.dataset.id);
        }
        if (button.dataset.action === "delete") {
          deleteMixture(button.dataset.id);
        }
      });

      oilRows.addEventListener("input", (event) => {
        const input = event.target;
        const oil = oils.find((item) => item.id === Number(input.dataset.id));
        if (!oil) return;
        oil[input.dataset.field] = input.dataset.field === "share" || input.dataset.field === "weight"
          ? Math.max(Number(input.value) || 0, 0)
          : input.value;
        calculate();
      });

      function configureMode() {
        document.querySelector("#percent-page-link").classList.toggle("is-active", pageMode === "percent");
        document.querySelector("#weight-page-link").classList.toggle("is-active", pageMode === "weight");
        fragranceMainLabel.textContent = pageMode === "weight" ? "Duftoel gesamt in g" : "Duftoel gesamt in %";
        fragranceResultLabel.textContent = pageMode === "weight" ? "Duftoelanteil" : "Duftoel gesamt";
        totalWeightInput.value = "100";
        totalWeightInput.readOnly = pageMode === "weight";
        fragrancePercentInput.min = pageMode === "weight" ? "0" : "15";
        fragrancePercentInput.max = pageMode === "weight" ? "" : "18";
        fragrancePercentInput.readOnly = pageMode === "weight";
        fragrancePercentInput.value = pageMode === "weight" ? (100 * (selectedFragrancePercent / 100)).toFixed(1) : "16";
        document.querySelector(".status-chip").textContent = pageMode === "weight" ? "Gramm zu Prozent" : "15-18% Duftoel";
      }
    </script>
  </body>
</html>
